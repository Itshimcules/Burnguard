<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Burnguard{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    {% set current_path = request.url.path %}
    <header class="topbar">
      <div class="brand">
        <img src="/static/burnguard-mark.svg" alt="" class="brand-mark">
        <div>
          <strong>Burnguard</strong>
          <span class="tagline">meter shared LLM API usage before coding agents turn curiosity into invoices</span>
        </div>
      </div>
      <div class="topbar-actions">
        <span class="mode-badge" title="Current gateway mode">{{ gateway_mode() }} mode</span>
        <nav aria-label="Primary">
          <a href="/" {% if current_path == "/" %}aria-current="page"{% endif %}>Overview</a>
          <a href="/keys" {% if current_path == "/keys" %}aria-current="page"{% endif %}>Keys</a>
          <a href="/sessions" {% if current_path.startswith("/sessions") %}aria-current="page"{% endif %}>Sessions</a>
          <a href="/requests" {% if current_path == "/requests" %}aria-current="page"{% endif %}>Requests</a>
      </nav>
      </div>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
