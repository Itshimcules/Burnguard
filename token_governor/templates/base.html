<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Burnguard{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <img src="/static/burnguard-mark.svg" alt="" class="brand-mark">
        <div>
          <strong>Burnguard</strong>
          <span class="tagline">meter shared LLM API usage before coding agents turn curiosity into invoices</span>
        </div>
      </div>
      <nav>
        <a href="/">Overview</a>
        <a href="/keys">Keys</a>
        <a href="/sessions">Sessions</a>
        <a href="/requests">Requests</a>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
