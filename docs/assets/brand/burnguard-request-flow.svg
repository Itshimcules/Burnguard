<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">Burnguard request flow</title>
  <desc id="desc">Six-step request flow from request receipt to session logging and warning flags.</desc>
  
  <rect width="1200" height="1600" fill="white"/>
  <text x="600" y="100" text-anchor="middle" fill="#132637" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="800">Burnguard request flow</text>
  <text x="600" y="140" text-anchor="middle" fill="#657381" font-family="Inter, Arial, sans-serif" font-size="30">What happens before an LLM request reaches the provider</text>
  <circle cx="145" cy="198" r="35" fill="#132637"/><text x="145" y="209" text-anchor="middle" fill="white" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800">1</text><path d="M145 243 V310" stroke="#ff5a14" stroke-width="5"/><path d="M132 300 L145 324 L158 300 Z" fill="#ff5a14"/><rect x="230" y="160" width="830" height="114" rx="20" fill="white" stroke="#ccd6df" stroke-width="2"/><text x="270" y="210" fill="#132637" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800">Request received</text><text x="270" y="250" fill="#657381" font-family="Inter, Arial, sans-serif" font-size="24">OpenAI-compatible chat completion request enters the gateway.</text><circle cx="145" cy="358" r="35" fill="#132637"/><text x="145" y="369" text-anchor="middle" fill="white" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800">2</text><path d="M145 403 V470" stroke="#ff5a14" stroke-width="5"/><path d="M132 460 L145 484 L158 460 Z" fill="#ff5a14"/><rect x="230" y="320" width="830" height="114" rx="20" fill="white" stroke="#ccd6df" stroke-width="2"/><text x="270" y="370" fill="#132637" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800">Validate virtual key</text><text x="270" y="410" fill="#657381" font-family="Inter, Arial, sans-serif" font-size="24">Identify owner, project, allowed models, and status.</text><circle cx="145" cy="518" r="35" fill="#132637"/><text x="145" y="529" text-anchor="middle" fill="white" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800">3</text><path d="M145 563 V630" stroke="#ff5a14" stroke-width="5"/><path d="M132 620 L145 644 L158 620 Z" fill="#ff5a14"/><rect x="230" y="480" width="830" height="114" rx="20" fill="white" stroke="#ccd6df" stroke-width="2"/><text x="270" y="530" fill="#132637" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800">Estimate cost</text><text x="270" y="570" fill="#657381" font-family="Inter, Arial, sans-serif" font-size="24">Approximate input/output cost before forwarding.</text><circle cx="145" cy="678" r="35" fill="#132637"/><text x="145" y="689" text-anchor="middle" fill="white" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800">4</text><path d="M145 723 V790" stroke="#ff5a14" stroke-width="5"/><path d="M132 780 L145 804 L158 780 Z" fill="#ff5a14"/><rect x="230" y="640" width="830" height="114" rx="20" fill="white" stroke="#ccd6df" stroke-width="2"/><text x="270" y="690" fill="#132637" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800">Check budget</text><text x="270" y="730" fill="#657381" font-family="Inter, Arial, sans-serif" font-size="24">Apply daily, monthly, and max-request limits.</text><circle cx="145" cy="838" r="35" fill="#132637"/><text x="145" y="849" text-anchor="middle" fill="white" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800">5</text><path d="M145 883 V950" stroke="#ff5a14" stroke-width="5"/><path d="M132 940 L145 964 L158 940 Z" fill="#ff5a14"/><rect x="230" y="800" width="830" height="114" rx="20" fill="white" stroke="#ccd6df" stroke-width="2"/><text x="270" y="850" fill="#132637" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800">Forward or block</text><text x="270" y="890" fill="#657381" font-family="Inter, Arial, sans-serif" font-size="24">Allowed requests go to the provider; blocked requests return a policy error.</text><circle cx="145" cy="998" r="35" fill="#132637"/><text x="145" y="1009" text-anchor="middle" fill="white" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800">6</text><rect x="230" y="960" width="830" height="114" rx="20" fill="white" stroke="#ccd6df" stroke-width="2"/><text x="270" y="1010" fill="#132637" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800">Log session + flags</text><text x="270" y="1050" fill="#657381" font-family="Inter, Arial, sans-serif" font-size="24">Store metadata, category, cost, and warning flags. Raw prompts are not stored by default.</text>

</svg>
